name: Fuel Price API Update

on:
  schedule:
    - cron: "0 6 * * *"  # daily at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Force Node.js 24 for JS actions

    steps:
      # Step 1: Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Setup Python with caching
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # Step 3: Upgrade pip and install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Run your scraper
      - name: Run scraper
        run: python scraper.py

      # Step 5: Commit & push generated files
      - name: Commit and push data
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          # Stage files safely (ignore errors if nothing to add)
          git add fuel_prices_latest.json fuel_prices_all.json history_json/ 2>/dev/null || true

          # Commit only if there are changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily fuel update"
            git push