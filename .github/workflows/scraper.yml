name: Fuel Price API Update

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push data
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          [ -f fuel_prices_latest.json ] && git add fuel_prices_latest.json
          [ -d history_json ] && git add history_json
          git diff --cached --quiet || git commit -m "Daily fuel update"
          git diff --cached --quiet || git push