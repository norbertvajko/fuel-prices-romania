# .github/workflows/scraper.yml
name: Fuel Price API Update

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # 1️⃣ Checkout repository on main branch
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
          persist-credentials: true

      # 2️⃣ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4️⃣ Run scraper
      - name: Run scraper
        run: python scraper.py

      # 5️⃣ Commit and push only if there are changes
      - name: Commit and push JSON updates
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          # Stage JSON files
          git add fuel_prices_latest.json fuel_prices_all.json history_json/ || true

          # Check if there are any changes
          CHANGES=$(git diff --cached --name-only)
          if [ -z "$CHANGES" ]; then
            echo "No changes to commit, skipping push"
          else
            # Ensure we are on main branch to avoid detached HEAD
            git checkout main
            git commit -m "Daily fuel update"
            git push origin main
          fi