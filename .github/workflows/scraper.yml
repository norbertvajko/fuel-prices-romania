# .github/workflows/scraper.yml
name: Fuel Price API Update

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # 1️⃣ Checkout the repository using GITHUB_TOKEN
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      # 2️⃣ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4️⃣ Run the scraper
      - name: Run scraper
        run: python scraper.py

      # 5️⃣ Commit & push JSON files only if there are changes
      - name: Commit and push JSON updates
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          # Stage all JSON files
          git add fuel_prices_latest.json fuel_prices_all.json
          git add history_json/

          # Only commit if there are staged changes
          if ! git diff --cached --quiet; then
            git commit -m "Daily fuel update"
            git push
          else
            echo "No changes to commit"
          fi