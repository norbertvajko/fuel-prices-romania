name: Fuel Price API Update

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push data safely
        run: |
          set -e

          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          # Stage JSON files
          [ -f fuel_prices_latest.json ] && git add fuel_prices_latest.json
          [ -f fuel_prices_all.json ] && git add fuel_prices_all.json
          [ -d history_json ] && git add history_json

          if [[ -n "$(git status --porcelain)" ]]; then
            git commit -m "Daily fuel update"

            # Wrap pull & push in a try/catch to avoid exit code 1
            {
              git pull --rebase origin main
              git push origin main
            } || echo "Git pull/push failed, skipping"
          else
            echo "No changes to commit"
          fi